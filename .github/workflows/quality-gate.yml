name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-cov pip-audit
      - name: Backend dependency audit
        run: pip-audit --progress-spinner=off
      - name: Run backend tests with coverage
        run: pytest -q --cov=app --cov-report=xml
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps
        run: npm ci
      - name: Mobile dependency audit
        run: npm audit --audit-level=high
      - name: Lint mobile
        run: npm run lint
      - name: Format check mobile
        run: npm run format:check
      - name: Run mobile tests with coverage
        run: npm test -- --coverage --runInBand
      - name: Typecheck mobile
        run: npm run typecheck
      - name: Validate mobile quality script
        run: npm run quality
      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info

  sonar:
    runs-on: ubuntu-latest
    needs: [backend, mobile]
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
