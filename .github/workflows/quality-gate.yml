name: Quality Gate

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-cov pip-audit
      - name: Backend dependency audit
        run: pip-audit --progress-spinner=off
      - name: Run backend tests with coverage
        run: pytest -q --cov=app --cov-report=xml
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  mobile-lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps
        run: npm ci
      - name: Mobile dependency audit
        run: npm audit --audit-level=high
      - name: Lint mobile
        run: npm run lint
      - name: Format check mobile
        run: npm run format:check

  mobile-typecheck:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps
        run: npm ci
      - name: Typecheck mobile
        run: npm run typecheck

  mobile-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps
        run: npm ci
      - name: Run mobile tests with coverage
        run: npm test -- --coverage --runInBand
      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info

  sonar:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-lint, mobile-typecheck, mobile-tests]
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
      - uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
