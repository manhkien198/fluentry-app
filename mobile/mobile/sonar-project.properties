sonar.projectKey=fluentry
sonar.projectName=Fluentry
sonar.sourceEncoding=UTF-8

# Monorepo sources
sonar.sources=backend/app,mobile/src
sonar.tests=backend/tests,mobile/src

# Test file detection
sonar.test.inclusions=**/tests/**/*.py,**/*.test.ts,**/*.test.tsx

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.mfa-venv/**,**/node_modules/**,**/.expo/**,**/dist/**,**/build/**,**/*.min.js

# Python
sonar.python.version=3.11

# Coverage and test reports (generated in CI)
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=mobile/coverage/lcov.info

# Duplication and issue noise reduction
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**/*.py
